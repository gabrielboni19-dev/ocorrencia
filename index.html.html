<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMCE - Registro de Ocorrência</title>
    <style>
        /* ==========================================================================
           1. ESTILOS DO FORMULÁRIO DE CADASTRO (VISÍVEL NA TELA)
           ========================================================================== */
        :root {
            --primary: #4d7c0f;
            --primary-dark: #3f6212;
            --primary-light: #f4fce3;
            --border-color: #a3e635;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 15px;
            color: var(--text-dark);
        }

        .container-cadastro {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .main-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .secao-cadastro {
            background: #fafafa;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .secao-cadastro h3 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            text-transform: uppercase;
            font-size: 1.05rem;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .bloco-dinamico {
            background: #ffffff;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 0 4px 4px 0;
            position: relative;
        }

        .btn-remover {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-adicionar {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 5px;
            width: 100%;
        }

        .acoes-container {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            border-top: 2px solid #e2e8f0;
            padding-top: 20px;
            justify-content: flex-end;
        }

        .btn-acao {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .btn-limpar { background-color: #64748b; color: white; }
        .btn-rascunho { background-color: #d97706; color: white; transition: background 0.3s; }
        .btn-pdf { background-color: var(--primary); color: white; }

        /* Escondido por padrão na visualização da tela */
        #espelho-impressao {
            display: none;
        }

        /* ==========================================================================
           2. REGRAS DE IMPRESSÃO (ESTILO DO PDF MODELO SEM LINKS E SEM DATAS)
           ========================================================================== */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            #interface-cadastro, .container-cadastro, .acoes-container, body > :not(#espelho-impressao) {
                display: none !important;
            }

            body {
                background-color: #ffffff !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #espelho-impressao {
                display: block !important;
                width: 100% !important;
                font-family: Arial, sans-serif !important;
                color: #000000 !important;
                font-size: 10pt !important;
                line-height: 1.4 !important;
                box-sizing: border-box !important;
                padding: 15mm !important;
            }

            .header-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
            .header-table td { border: 1px solid var(--primary-dark); padding: 8px; vertical-align: middle; }
            .logo-box { width: 22%; text-align: center; background-color: var(--primary-light) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .logo-text { font-weight: bold; font-size: 13pt; color: var(--primary-dark); margin: 0; }
            .logo-sub { font-size: 7.5pt; font-weight: bold; color: var(--primary); margin-top: 2px; }
            .title-box { width: 48%; text-align: center; }
            .title-main { font-size: 13pt; font-weight: bold; color: #000000; margin: 0; }
            .title-sub { font-size: 10pt; font-weight: bold; color: var(--primary-dark); margin-top: 3px; }
            .meta-box { width: 30%; font-size: 9pt; }

            .section-title {
                background-color: #84cc16 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                color: #ffffff !important;
                font-size: 10pt;
                font-weight: bold;
                padding: 5px 10px;
                text-transform: uppercase;
                border: 1px solid var(--primary-dark);
                margin-top: 14px;
                margin-bottom: 0;
                page-break-after: avoid;
            }

            .form-table { width: 100%; border-collapse: collapse; margin-bottom: 0px; }
            .form-table td { border: 1px solid var(--border-color); padding: 7px; vertical-align: top; }
            .form-table tr { page-break-inside: avoid; }
            
            .field-label { font-size: 8pt; font-weight: bold; color: var(--primary-dark); text-transform: uppercase; display: block; margin-bottom: 2px; }
            .field-value { font-size: 10pt; color: #000000; display: block; word-wrap: break-word; }

            .checkbox-container { font-size: 9pt; font-weight: bold; display: inline-block; margin-top: 4px; }
            .checkbox { display: inline-block; width: 11px; height: 11px; border: 1px solid var(--primary-dark); margin-right: 4px; vertical-align: middle; }
            .checkbox.checked { background-color: var(--primary) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

            .narrative-box {
                border: 1px solid var(--border-color);
                padding: 10px;
                font-size: 10pt;
                line-height: 1.5;
                text-align: justify;
                word-wrap: break-word;
                white-space: pre-wrap;
                page-break-inside: auto;
            }

            .signature-table { width: 100%; border-collapse: collapse; margin-top: 35px; page-break-inside: avoid; }
            .signature-table td { border: none; width: 50%; text-align: center; padding: 5px; }
            .sig-line { width: 80%; border-top: 1px solid var(--primary-dark); margin: 35px auto 4px auto; }
            .sig-label { font-size: 8.5pt; font-weight: bold; color: var(--primary-dark); }

            .pdf-item-lista { padding: 8px; border-bottom: 1px dashed #cbd5e1; page-break-inside: avoid; font-size: 9.5pt; }
            .pdf-item-lista:last-child { border-bottom: none; }
            .container-dinamico-pdf { border: 1px solid var(--border-color); background-color: #ffffff; }
        }
    </style>
</head>
<body>

    <div class="container-cadastro" id="interface-cadastro">
        <h2 class="main-title">Relatório de Ocorrência Policial (PMCE)</h2>
        
        <div class="secao-cadastro">
            <h3>Controle Operacional</h3>
            <div class="grid-form">
                <div class="form-group"><label for="form_ciops">Ficha CIOPS</label><input type="text" id="form_ciops"></div>
                <div class="form-group"><label for="form_vtr">Prefixo da Viatura</label><input type="text" id="form_vtr"></div>
            </div>
        </div>

        <div class="secao-cadastro">
            <h3>Dados Primários</h3>
            <div class="grid-form">
                <div class="form-group"><label for="form_data">Data do Fato</label><input type="date" id="form_data"></div>
                <div class="form-group"><label for="form_horario">Horário do Fato</label><input type="time" id="form_horario"></div>
                <div class="form-group">
                    <label for="form_natureza_tipo">Natureza da Ocorrência</label>
                    <select id="form_natureza_tipo">
                        <option value="Delituosa">Delituosa</option>
                        <option value="Não Delituosa">Não Delituosa</option>
                    </select>
                </div>
            </div>
            <div class="grid-form">
                <div class="form-group" style="grid-column: span 2;"><label for="form_logradouro">Logradouro</label><input type="text" id="form_logradouro"></div>
                <div class="form-group"><label for="form_numero">Número</label><input type="text" id="form_numero"></div>
                <div class="form-group"><label for="form_complemento">Complemento / Ref.</label><input type="text" id="form_complemento"></div>
            </div>
            <div class="grid-form">
                <div class="form-group"><label for="form_bairro">Bairro</label><input type="text" id="form_bairro"></div>
                <div class="form-group"><label for="form_lat">Latitude</label><input type="text" id="form_lat"></div>
                <div class="form-group"><label for="form_long">Longitude</label><input type="text" id="form_long"></div>
            </div>
            <div class="form-group">
                <label>Tipificações Assinaladas</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Homicídio"> Homicídio</label>
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Porte ilegal de arma"> Porte ilegal de arma</label>
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Roubo"> Roubo</label>
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Furto"> Furto</label>
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Tráfico de Drogas"> Tráfico de Drogas</label>
                    <label class="checkbox-label"><input type="checkbox" class="form_tipificacao" value="Lesão Corporal"> Lesão Corporal</label>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label for="form_outra_tipificacao" style="color: #0284c7; font-weight: bold;">Outra Situação / Crime não listado (Digite aqui):</label>
                    <input type="text" id="form_outra_tipificacao" placeholder="Ex: Receptação, Estelionato, Dano...">
                </div>
            </div>
        </div>

        <div class="secao-cadastro">
            <h3>Pessoas Envolvidas</h3>
            <div id="container-pessoas"></div>
            <button type="button" class="btn-adicionar" onclick="adicionarPessoa()">+ Adicionar Pessoa</button>
        </div>

        <div class="secao-cadastro">
            <h3>Apreensões (Armas, Drogas, Veículos)</h3>
            <div id="container-apreensoes"></div>
            <button type="button" class="btn-adicionar" onclick="adicionarApreensao()">+ Adicionar Apreensão</button>
        </div>

        <div class="secao-cadastro">
            <h3>Narrativa dos Fatos</h3>
            <div class="form-group">
                <textarea id="form_narrativa" rows="8" placeholder="Digite detalhadamente a dinâmica da ocorrência..."></textarea>
            </div>
        </div>

        <div class="secao-cadastro">
            <h3>Dados do Efetivo Policial</h3>
            <div id="container-efetivo"></div>
            <button type="button" class="btn-adicionar" onclick="adicionarMilitar()">+ Adicionar Policial</button>
        </div>

        <div class="secao-cadastro">
            <h3>Dados Complementares / Procedimentos</h3>
            <div class="grid-form">
                <div class="form-group"><label for="form_delegacia">Delegacia / Órgão</label><input type="text" id="form_delegacia"></div>
                <div class="form-group"><label for="form_procedimento_num">Nº do Procedimento na DP</label><input type="text" id="form_procedimento_num"></div>
                <div class="form-group"><label for="form_hora_fim">Horário Encerramento</label><input type="time" id="form_hora_fim"></div>
            </div>
            <div class="grid-form">
                <div class="form-group"><label for="form_ass_resp_nome">Nome Responsável Preenchimento</label><input type="text" id="form_ass_resp_nome"></div>
                <div class="form-group"><label for="form_ass_resp_mat">Matrícula Responsável</label><input type="text" id="form_ass_resp_mat"></div>
            </div>
            <div class="grid-form">
                <div class="form-group"><label for="form_ass_sup_nome">Nome Supervisor de Área</label><input type="text" id="form_ass_sup_nome"></div>
                <div class="form-group"><label for="form_ass_sup_mat">Matrícula Supervisor</label><input type="text" id="form_ass_sup_mat"></div>
            </div>
        </div>

        <div class="acoes-container">
            <button class="btn-acao btn-limpar" onclick="novaOcorrencia()">Limpar Tudo</button>
            <button class="btn-acao btn-rascunho" id="btn-salvar-rascunho" onclick="salvarDadosLocal()">Salvar Rascunho</button>
            <button class="btn-acao btn-pdf" onclick="gerarPDF()">Gerar PDF Oficial</button>
        </div>
    </div>

    <div id="espelho-impressao"></div>

    <script>
        let contadorPessoas = 0; let contadorApreensoes = 0; let contadorEfetivo = 0;

        function adicionarPessoa() {
            contadorPessoas++;
            const div = document.createElement('div'); div.className = 'bloco-dinamico'; div.id = `bloco_pessoa_${contadorPessoas}`;
            div.innerHTML = `<button class="btn-remover" onclick="document.getElementById('bloco_pessoa_${contadorPessoas}').remove()">Remover</button>
                <div class="grid-form">
                    <div class="form-group"><label>Nome Completo</label><input type="text" class="p_nome"></div>
                    <div class="form-group"><label>Vulgo / Apelido</label><input type="text" class="p_vulgo"></div>
                    <div class="form-group"><label>Nome da Mãe</label><input type="text" class="p_mae"></div>
                </div>
                <div class="grid-form">
                    <div class="form-group" style="grid-column: span 2;"><label>Endereço</label><input type="text" class="p_endereco"></div>
                    <div class="form-group"><label>Classificação</label><select class="p_classe"><option value="Acusado / Infrator">Acusado / Infrator</option><option value="Vítima (Fatal)">Vítima (Fatal)</option><option value="Vítima (Não Fatal)">Vítima (Não Fatal)</option><option value="Testemunha">Testemunha</option></select></div>
                    <div class="form-group"><label>Preso/Conduzido?</label><select class="p_preso"><option value="Não">Não</option><option value="Sim (Flagrante)">Sim (Flagrante)</option><option value="Sim (Mandado)">Sim (Mandado)</option></select></div>
                </div>`;
            document.getElementById('container-pessoas').appendChild(div); return div;
        }

        function adicionarApreensao() {
            contadorApreensoes++;
            const div = document.createElement('div'); div.className = 'bloco-dinamico'; div.id = `bloco_apreensao_${contadorApreensoes}`;
            div.innerHTML = `<button class="btn-remover" onclick="document.getElementById('bloco_apreensao_${contadorApreensoes}').remove()">Remover</button>
                <div class="grid-form">
                    <div class="form-group"><label>Categoria</label><select class="a_categoria"><option value="Arma de Fogo">Arma de Fogo</option><option value="Arma Branca / Simulacro">Arma Branca / Simulacro</option><option value="Entorpecentes (Drogas)">Entorpecentes (Drogas)</option><option value="Veículo">Veículo</option><option value="Outros">Outros</option></select></div>
                    <div class="form-group" style="grid-column: span 2;"><label>Detalhamento (Modelo, Calibre, Placa)</label><input type="text" class="a_detalhe"></div>
                    <div class="form-group"><label>Qtd / Peso</label><input type="text" class="a_qtd"></div>
                </div>`;
            document.getElementById('container-apreensoes').appendChild(div); return div;
        }

        function adicionarMilitar() {
            contadorEfetivo++;
            const div = document.createElement('div'); div.className = 'bloco-dinamico'; div.id = `bloco_militar_${contadorEfetivo}`;
            div.innerHTML = `<button class="btn-remover" onclick="document.getElementById('bloco_militar_${contadorEfetivo}').remove()">Remover</button>
                <div class="grid-form">
                    <div class="form-group"><label>Posto/Graduação</label><input type="text" class="ef_posto" placeholder="Ex: SGT, CB"></div>
                    <div class="form-group"><label>Nome de Guerra</label><input type="text" class="ef_nome"></div>
                    <div class="form-group"><label>Matrícula</label><input type="text" class="ef_mat"></div>
                    <div class="form-group"><label>IRSO?</label><select class="ef_irso"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>`;
            document.getElementById('container-efetivo').appendChild(div); return div;
        }

        // CARREGAMENTO SEGURO
        document.addEventListener('DOMContentLoaded', () => {
            const rascunho = localStorage.getItem('rascunho_ocorrencia_pmce');
            if (rascunho) {
                restaurarRascunho(JSON.parse(rascunho));
            }
        });

        // PERSISTÊNCIA LOCAL (RASCUNHO)
        function salvarDadosLocal() {
            try {
                const dadosObjeto = {
                    vtr: document.getElementById('form_vtr').value, ciops: document.getElementById('form_ciops').value,
                    data: document.getElementById('form_data').value, horario: document.getElementById('form_horario').value,
                    natureza: document.getElementById('form_natureza_tipo').value, logradouro: document.getElementById('form_logradouro').value,
                    numero: document.getElementById('form_numero').value, complemento: document.getElementById('form_complemento').value,
                    bairro: document.getElementById('form_bairro').value, lat: document.getElementById('form_lat').value, long: document.getElementById('form_long').value,
                    outra_tipificacao: document.getElementById('form_outra_tipificacao').value,
                    narrativa: document.getElementById('form_narrativa').value, delegacia: document.getElementById('form_delegacia').value,
                    procedimento: document.getElementById('form_procedimento_num').value, hora_fim: document.getElementById('form_hora_fim').value,
                    resp_nome: document.getElementById('form_ass_resp_nome').value, resp_mat: document.getElementById('form_ass_resp_mat').value,
                    sup_nome: document.getElementById('form_ass_sup_nome').value, sup_mat: document.getElementById('form_ass_sup_mat').value,
                    tipificacoes: Array.from(document.querySelectorAll('.form_tipificacao:checked')).map(cb => cb.value),
                    pessoas: Array.from(document.querySelectorAll('#container-pessoas .bloco-dinamico')).map(b => ({ nome: b.querySelector('.p_nome').value, vulgo: b.querySelector('.p_vulgo').value, mae: b.querySelector('.p_mae').value, endereco: b.querySelector('.p_endereco').value, classe: b.querySelector('.p_classe').value, preso: b.querySelector('.p_preso').value })),
                    apreensoes: Array.from(document.querySelectorAll('#container-apreensoes .bloco-dinamico')).map(b => ({ categoria: b.querySelector('.a_categoria').value, detalhe: b.querySelector('.a_detalhe').value, qtd: b.querySelector('.a_qtd').value })),
                    militar: Array.from(document.querySelectorAll('#container-efetivo .bloco-dinamico')).map(b => ({ posto: b.querySelector('.ef_posto').value, nome: b.querySelector('.ef_nome').value, mat: b.querySelector('.ef_mat').value, irso: b.querySelector('.ef_irso').value }))
                };
                
                localStorage.setItem('rascunho_ocorrencia_pmce', JSON.stringify(dadosObjeto));
                
                const btn = document.getElementById('btn-salvar-rascunho');
                btn.style.backgroundColor = '#16a34a'; btn.innerText = '✓ Rascunho Salvo!';
                setTimeout(() => { btn.style.backgroundColor = '#d97706'; btn.innerText = 'Salvar Rascunho'; }, 2000);
            } catch (error) {
                alert("Erro técnico de salvamento local.");
            }
        }

        function restaurarRascunho(dados) {
            if(!dados) return;
            document.getElementById('form_vtr').value = dados.vtr || ''; document.getElementById('form_ciops').value = dados.ciops || '';
            document.getElementById('form_data').value = dados.data || ''; document.getElementById('form_horario').value = dados.horario || '';
            document.getElementById('form_natureza_tipo').value = dados.natureza || 'Delituosa'; document.getElementById('form_logradouro').value = dados.logradouro || '';
            document.getElementById('form_numero').value = dados.numero || ''; document.getElementById('form_complemento').value = dados.complemento || '';
            document.getElementById('form_bairro').value = dados.bairro || ''; document.getElementById('form_lat').value = dados.lat || ''; document.getElementById('form_long').value = dados.long || '';
            document.getElementById('form_outra_tipificacao').value = dados.outra_tipificacao || '';
            document.getElementById('form_narrativa').value = dados.narrativa || ''; document.getElementById('form_delegacia').value = dados.delegacia || '';
            document.getElementById('form_procedimento_num').value = dados.procedimento || ''; document.getElementById('form_hora_fim').value = dados.hora_fim || '';
            document.getElementById('form_ass_resp_nome').value = dados.resp_nome || ''; document.getElementById('form_ass_resp_mat').value = dados.resp_mat || '';
            document.getElementById('form_ass_sup_nome').value = dados.sup_nome || ''; document.getElementById('form_ass_sup_mat').value = dados.sup_mat || '';
            
            if(dados.tipificacoes) document.querySelectorAll('.form_tipificacao').forEach(cb => { cb.checked = dados.tipificacoes.includes(cb.value); });
            if(dados.pessoas) { dados.pessoas.forEach(p => { let b = adicionarPessoa(); b.querySelector('.p_nome').value = p.nome; b.querySelector('.p_vulgo').value = p.vulgo; b.querySelector('.p_mae').value = p.mae; b.querySelector('.p_endereco').value = p.endereco; b.querySelector('.p_classe').value = p.classe; b.querySelector('.p_preso').value = p.preso; }); }
            if(dados.apreensoes) { dados.apreensoes.forEach(a => { let b = adicionarApreensao(); b.querySelector('.a_categoria').value = a.categoria; b.querySelector('.a_detalhe').value = a.detalhe; b.querySelector('.a_qtd').value = a.qtd; }); }
            if(dados.militar) { dados.militar.forEach(m => { let b = adicionarMilitar(); b.querySelector('.ef_posto').value = m.posto; b.querySelector('.ef_nome').value = m.nome; b.querySelector('.ef_mat').value = m.mat; b.querySelector('.ef_irso').value = m.irso; }); }
        }

        // FUNÇÃO DE LIMPEZA CORRIGIDA
        function novaOcorrencia() { 
            if (confirm("Deseja apagar TODOS os dados da tela e iniciar uma nova ocorrência limpa?")) { 
                localStorage.removeItem('rascunho_ocorrencia_pmce'); // Deleta o rascunho permanentemente
                window.location.reload(); // Reinicia o sistema totalmente em branco
            } 
        }

        // GERAÇÃO DO DOCUMENTO OFICIAL PARA IMPRESSÃO
        function gerarPDF() {
            const obterValor = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
            const target = document.getElementById('espelho-impressao');
            
            let htmlPessoas = '';
            document.querySelectorAll('#container-pessoas .bloco-dinamico').forEach(b => { 
                htmlPessoas += `<div class="pdf-item-lista">
                    <b>Nome:</b> ${b.querySelector('.p_nome').value || 'N/I'} (${b.querySelector('.p_vulgo').value || 'N/I'}) | 
                    <b>Mãe:</b> ${b.querySelector('.p_mae').value || 'N/I'} | 
                    <b>Condição:</b> ${b.querySelector('.p_classe').value} | 
                    <b>Preso/Conduzido:</b> ${b.querySelector('.p_preso').value} <br>
                    <b>Endereço:</b> ${b.querySelector('.p_endereco').value || 'N/I'}
                </div>`; 
            });
            if(!htmlPessoas) htmlPessoas = '<div class="pdf-item-lista">Nenhuma pessoa listada.</div>';

            let htmlApreensoes = '';
            document.querySelectorAll('#container-apreensoes .bloco-dinamico').forEach(b => { 
                htmlApreensoes += `<div class="pdf-item-lista"><b>Categoria:</b> ${b.querySelector('.a_categoria').value} | <b>Detalhamento:</b> ${b.querySelector('.a_detalhe').value || 'N/I'} | <b>Qtd/Peso:</b> ${b.querySelector('.a_qtd').value || '0'}</div>`; 
            });
            if(!htmlApreensoes) htmlApreensoes = '<div class="pdf-item-lista">Nenhuma apreensão listada.</div>';

            let htmlEfetivo = '';
            document.querySelectorAll('#container-efetivo .bloco-dinamico').forEach(b => { 
                htmlEfetivo += `<tr><td>${b.querySelector('.ef_posto').value || 'N/I'}</td><td>${b.querySelector('.ef_nome').value || 'N/I'}</td><td>${b.querySelector('.ef_mat').value || 'N/I'}</td><td>${b.querySelector('.ef_irso').value}</td></tr>`; 
            });
            if(!htmlEfetivo) htmlEfetivo = '<tr><td colspan="4">Nenhum militar listado.</td></tr>';

            let listaTipificacoes = Array.from(document.querySelectorAll('.form_tipificacao:checked')).map(cb => cb.value);
            let outraTip = obterValor('form_outra_tipificacao').trim();
            if(outraTip !== '') { listaTipificacoes.push(outraTip); }
            let tipificacoesFinais = listaTipificacoes.join(', ') || 'Nenhuma Informada';

            target.innerHTML = `
                <table class="header-table">
                    <tr>
                        <td class="logo-box"><div class="logo-text">PMCE</div><div class="logo-sub">POLÍCIA MILITAR DO CEARÁ</div></td>
                        <td class="title-box"><div class="title-main">RELATÓRIO DE OCORRÊNCIA</div><div class="title-sub">17º BPM - AIS 17</div></td>
                        <td class="meta-box">
                            <span class="field-label">FICHA CIOPS:</span> <span class="field-value" style="font-weight:bold;">${obterValor('form_ciops') || 'N/I'}</span>
                            <span class="field-label">Viatura:</span> <span class="field-value">${obterValor('form_vtr') || 'N/I'}</span>
                        </td>
                    </tr>
                </table>

                <div class="section-title">Dados Primários</div>
                <table class="form-table">
                    <tr>
                        <td style="width: 25%;"><span class="field-label">Data</span><span class="field-value">${obterValor('form_data') || 'N/I'}</span></td>
                        <td style="width: 25%;"><span class="field-label">Horário</span><span class="field-value">${obterValor('form_horario') || 'N/I'}</span></td>
                        <td style="width: 50%;">
                            <span class="field-label">Natureza da Ocorrência</span>
                            <span class="checkbox-container"><span class="checkbox ${obterValor('form_natureza_tipo') === 'Delituosa' ? 'checked' : ''}"></span> DELITUOSA</span>
                            <span class="checkbox-container" style="margin-left: 15px;"><span class="checkbox ${obterValor('form_natureza_tipo') === 'Não Delituosa' ? 'checked' : ''}"></span> NÃO DELITUOSA</span>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"><span class="field-label">Logradouro</span><span class="field-value">${obterValor('form_logradouro') || 'N/I'}</span></td>
                        <td><span class="field-label">Número / Complemento</span><span class="field-value">${obterValor('form_numero') || 'S/N'} / ${obterValor('form_complemento') || 'N/I'}</span></td>
                    </tr>
                    <tr>
                        <td><span class="field-label">Bairro</span><span class="field-value">${obterValor('form_bairro') || 'N/I'}</span></td>
                        <td colspan="2"><span class="field-label">Tipificações Assinaladas</span><span class="field-value" style="font-weight: bold;">${tipificacoesFinais}</span></td>
                    </tr>
                    <tr>
                        <td colspan="3"><span class="field-label">Coordenadas Geográficas</span><span class="field-value"><b>Lat:</b> ${obterValor('form_lat') || 'N/I'} &nbsp;&nbsp;&nbsp;&nbsp; <b>Long:</b> ${obterValor('form_long') || 'N/I'}</span></td>
                    </tr>
                </table>

                <div class="section-title">Pessoas Envolvidas</div>
                <div class="container-dinamico-pdf">${htmlPessoas}</div>

                <div class="section-title">Apreensões (Armas, Drogas, Veículos)</div>
                <div class="container-dinamico-pdf">${htmlApreensoes}</div>

                <div class="section-title">Narrativa dos Fatos</div>
                <div class="narrative-box">${obterValor('form_narrativa') || 'Nenhuma narrativa informada.'}</div>

                <div class="section-title">Dados do Efetivo Policial</div>
                <table class="form-table">
                    <tr style="background-color: #f4fce3; font-weight: bold; font-size: 8.5pt;">
                        <td style="width: 20%;">Posto/Grad</td><td style="width: 45%;">Nome de Guerra</td><td style="width: 20%;">Matrícula</td><td style="width: 15%;">IRSO</td>
                    </tr>
                    <tbody>${htmlEfetivo}</tbody>
                </table>

                <div class="section-title">Dados Complementares / Procedimentos</div>
                <table class="form-table">
                    <tr>
                        <td style="width: 40%;"><span class="field-label">Delegacia / Órgão</span><span class="field-value">${obterValor('form_delegacia') || 'N/I'}</span></td>
                        <td style="width: 35%;"><span class="field-label">Nº do Procedimento na DP</span><span class="field-value">${obterValor('form_procedimento_num') || 'N/I'}</span></td>
                        <td style="width: 25%;"><span class="field-label">Horário de Encerramento</span><span class="field-value">${obterValor('form_hora_fim') || 'N/I'}</span></td>
                    </tr>
                </table>

                <table class="signature-table">
                    <tr>
                        <td><div class="sig-line"></div><div class="sig-label">Responsável pelo Preenchimento</div><div class="field-value" style="font-size:9.5pt;">${obterValor('form_ass_resp_nome') || 'N/I'} - Matr. ${obterValor('form_ass_resp_mat') || 'N/I'}</div></td>
                        <td><div class="sig-line"></div><div class="sig-label">Supervisor de Área</div><div class="field-value" style="font-size:9.5pt;">${obterValor('form_ass_sup_nome') || 'N/I'} - Matr. ${obterValor('form_ass_sup_mat') || 'N/I'}</div></td>
                    </tr>
                </table>
            `;

            window.print();
        }
    </script>
</body>
</html>
